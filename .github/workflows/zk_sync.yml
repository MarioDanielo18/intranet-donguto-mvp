name: Sincronización Automática ZKBio Zlink

on:
  push:
    branches: [ main ]
  schedule:
    # Se ejecuta de forma automática:
    # A las 07:00 AM, 11:00 AM, 03:00 PM, 06:00 PM y 10:00 PM (Hora de Perú, UTC-5)
    # UTC Equivalentes: 12:00, 16:00, 20:00, 23:00, 03:00 UTC
    - cron: '0 3,12,16,20,23 * * *'
  workflow_dispatch: # Permite ejecutar el bot manualmente desde GitHub con un botón

permissions:
  contents: write

jobs:
  sync-biometric:
    runs-on: ubuntu-latest

    steps:
    - name: Obtener Código del Repositorio
      uses: actions/checkout@v4

    - name: Instalar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias del Sistema
      run: |
        # Los runners de GitHub ya traen Chrome preinstalado, solo actualizamos paquetes
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Instalar Librerías de Python
      run: |
        python -m pip install --upgrade pip
        pip install selenium pandas openpyxl webdriver-manager

    - name: Ejecutar Bot de Sincronización
      env:
        ZLINK_EMAIL: ${{ secrets.ZLINK_EMAIL }}
        ZLINK_PASSWORD: ${{ secrets.ZLINK_PASSWORD }}
      run: |
        python zkbiolink_bot.py

    - name: Subir Capturas de Depuración
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: zlink-debug-screenshots
        path: |
          zlink_page_debug.png
          zlink_error_debug.png
          **/zlink_page_debug.png
          **/zlink_error_debug.png

    - name: Commit y Push de Capturas de Pantalla a GitHub
      if: always()
      run: |
        git config --global user.name "RPA Bot"
        git config --global user.email "bot@donguto.com"
        # Mover capturas a la raíz si estuvieran en carpetas internas
        mv intranet/zlink_page_debug.png ./ 2>/dev/null || true
        mv intranet/zlink_error_debug.png ./ 2>/dev/null || true
        git add zlink_page_debug.png zlink_error_debug.png || true
        git commit -m "debug: capturas de pantalla de la corrida mas reciente [skip ci]" || true
        git push origin main || true
